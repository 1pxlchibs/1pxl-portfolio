<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script type="module" src="./src/main.ts"></script>
  <script type="module" src="./src/asciiSpiral.js"></script>
  <link rel="stylesheet" href="./css/css-reset.css">
  <link rel="stylesheet" href="./css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0 maximum-scale=1" />
  <script src="https://kit.fontawesome.com/d5effce557.js" crossorigin="anonymous"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    function playSound() {
        var sound = new Audio("./assets/type_tone.mp3");
        sound.play();
    }
  </script>

  <title>Enrique Poirier</title>
</head>

<body>
  <!-- Background and Visual Effects -->
  <div id="stage"></div>
  <div class="scanline"></div>
  <div id="blur"></div>

  <!-- Desktop Buttons -->
  <div class="desktop-buttons">
    <a id="portfolioBtn" class="fa-solid fa-terminal desktop-button"><div class="desktop-button-text">Portfolio</div></a>
    <a id="terminalBtn" class="fa-solid fa-terminal desktop-button"><div class="desktop-button-text">Terminal</div></a>
    <a id="blogBtn" class="fa-solid fa-folder-open desktop-button"><div class="desktop-button-text">Blog</div></a>
  </div>

  <!-- Portfolio Window -->
  <article id="portfolio-window" class="base-window">
    <div id="portfolio-bars">
      <div id="bar-1">portfolio.exe<a id="portfolio-exit-button" class="fa-solid fa-xmark"></a></div>
    </div>
    <br>
    <div id="terminal">
      <!-- command output will be inserted before #write-lines-->
      <section class="projects"></section>
    </div>
  </article>

  <!-- Terminal Window -->
  <article id="terminal-window" class="base-window">
    <div id="terminal-bars">
      <div id="bar-1">terminal.exe<a id="exit-button" class="fa-solid fa-xmark"></a></div>
    </div>
    <br>
    <div id="terminal">
      <!-- command output will be inserted before #write-lines-->
      <a id="write-lines"></a>
    </div>
    <div id="input-line">
      <div>
        <p id="password-input" style="display: none;">Password: <input id="password-field" autocomplete="off" autofocus="on" onkeydown="playSound()" oninput="this.style.width = ((this.value.length)) + 'ch';"
            type="password" /><span class="blink">█</span></p>
        <p id="input-hidden">
          <span id="prompt"><span style="color: var(--prompt-1)">guest</span><span
              style="color: var(--prompt-default)">@</span><span style="color: var(--prompt-2)">5_os.dev</span><span
              style="color: var(--prompt-default)">:$ ~</span>
          </span>
          <input id="user-input" spellcheck="false" autocapitalize="none" autocomplete="off" autofocus="on" onkeydown="playSound()" oninput="this.style.width = ((this.value.length)) + 'ch';"><span class="blink">█</span>
        </p>
      </div>
      <br>
    </div>
  </article>
  
  <!-- Blog Window -->
  <article id="blog-window" class="base-window">
    <div id="blog-bars">
      <div id="bar-1">blog.exe<a id="blog-exit-button" class="fa-solid fa-xmark"></a></div>
    </div>
    <br>
    <div id="terminal">
      <p>Blogs coming soon...</p>
      <a id="write-lines"></a>
    </div>
  </article>

  <!-- Time and Weather Widget -->
  <article id="timeWidget">
    <div>
      <span class="fa-solid fa-cloud"></span>
      <span id="weather"></span>
      <span id="temperature"></span>
    </div>
    <div>
      <span class="fa-solid fa-clock"></span>
      <span id="time"></span>
    </div>
  </article>
  
  <footer>
    <p>© 2026 Enrique Poirier. All rights reserved.</p>
  </footer>
</body>
</html>
